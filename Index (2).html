<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHP MDT — Florida Highway Patrol</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--card:#161b22;--card2:#1c2128;--border:#30363d;
  --primary:#3b82f6;--primary-10:rgba(59,130,246,0.1);--primary-20:rgba(59,130,246,0.2);--primary-25:rgba(59,130,246,0.25);
  --text:#e6edf3;--muted:#8b949e;--muted2:#484f58;
  --green:#3fb950;--red:#f85149;--amber:#d29922;--orange:#e3702a;--teal:#2dd4bf;--yellow:#d29922;
  --destructive:#f85149;
}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,textarea,select{font-family:inherit;outline:none;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;width:100%;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
select option{background:var(--card2)}
textarea{resize:vertical}
label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:5px}
.field{margin-bottom:14px}

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}

/* Grid BG */
.grid-bg{position:absolute;inset:0;pointer-events:none;opacity:.03;background-image:linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px);background-size:40px 40px;z-index:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;transition:all .15s;cursor:pointer;font-family:inherit;border:1px solid transparent}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}.btn-outline:hover{background:var(--card2)}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(248,81,73,.3)}.btn-danger:hover{background:rgba(248,81,73,.1)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:9px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border:1px solid;white-space:nowrap}
.badge-critical{color:var(--red);border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.1)}
.badge-high{color:var(--orange);border-color:rgba(227,112,42,.5);background:rgba(227,112,42,.1)}
.badge-medium{color:var(--green);border-color:rgba(63,185,80,.5);background:rgba(63,185,80,.1)}
.badge-low{color:var(--teal);border-color:rgba(45,212,191,.5);background:rgba(45,212,191,.1)}
.badge-active{color:var(--orange);border-color:rgba(227,112,42,.5);background:rgba(227,112,42,.1)}
.badge-closed,.badge-resolved{color:var(--teal);border-color:rgba(45,212,191,.5);background:rgba(45,212,191,.1)}
.badge-extreme{color:var(--red);border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.1)}
.badge-neutral{color:var(--muted);border-color:var(--border);background:transparent}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.card-header{padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:14px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700}

/* LAYOUT */
#root{display:flex;flex-direction:column;height:100vh}

/* LOGIN */
#login-screen{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-card{width:360px;position:relative;z-index:1}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

/* APP LAYOUT */
#app-layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:248px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo-area{height:72px;display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--border)}
.logo-text .t1{font-size:14px;font-weight:700;letter-spacing:.18em}
.logo-text .t2{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.logo-text .t3{font-size:8px;color:var(--muted2);letter-spacing:.07em;text-transform:uppercase;margin-top:1px}
#nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-section-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:6px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--muted);margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--card2);color:var(--text)}
.nav-item.active{background:var(--primary-10);color:var(--primary);border-color:var(--primary-25)}
.nav-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border)}
.trooper-block{background:var(--primary-10);border:1px solid var(--primary-25);border-radius:6px;padding:9px 12px;margin-bottom:10px}
.trooper-name{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:2px}
.trooper-cs{font-size:10px;color:var(--muted)}
.status-row{display:flex;align-items:center;justify-content:space-between}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}
.dot-pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--card);flex-shrink:0}

#page{flex:1;overflow-y:auto;padding:28px;position:relative}
.page-inner{position:relative;z-index:1;max-width:1200px;margin:0 auto}
.page-title{font-size:22px;font-weight:700;letter-spacing:.12em;margin-bottom:4px}
.page-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:10px;width:500px;max-height:88vh;display:flex;flex-direction:column}
.modal-lg{width:560px}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:8px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* TOGGLE BUTTONS */
.toggle-group{display:flex;gap:8px}
.toggle-btn{flex:1;padding:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border:1px solid var(--border);border-radius:6px;color:var(--muted);transition:all .15s;cursor:pointer;font-family:inherit;background:none}
.toggle-btn:hover{border-color:var(--primary-25);color:var(--text)}
.toggle-btn.selected-primary{background:var(--primary-10);border-color:var(--primary);color:var(--primary)}
.toggle-btn.selected-critical{background:rgba(248,81,73,.1);border-color:var(--red);color:var(--red)}
.toggle-btn.selected-high{background:rgba(227,112,42,.1);border-color:var(--orange);color:var(--orange)}
.toggle-btn.selected-medium{background:rgba(63,185,80,.1);border-color:var(--green);color:var(--green)}
.toggle-btn.selected-low{background:rgba(45,212,191,.1);border-color:var(--teal);color:var(--teal)}
.toggle-btn.selected-extreme{background:rgba(248,81,73,.15);border-color:var(--red);color:var(--red)}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.stat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.stat-icon{font-size:14px}
.stat-num{font-size:26px;font-weight:700;letter-spacing:.05em;line-height:1}
.stat-sub{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

/* CALL CARDS */
.call-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.call-main{flex:1;min-width:0}
.call-num{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px}
.call-type{font-size:15px;font-weight:700;margin-bottom:4px}
.call-loc{font-size:11px;color:var(--muted);margin-bottom:4px}
.call-by{font-size:10px;color:var(--muted2)}
.call-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.call-time{font-size:10px;color:var(--muted);margin-top:4px}
.section-divider{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* BOLO CARDS */
.bolo-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;border-left-width:3px;position:relative}
.bolo-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.bolo-avatar{width:64px;height:64px;border-radius:8px;border:1px solid var(--border);object-fit:cover;background:var(--card2);flex-shrink:0}
.bolo-avatar-placeholder{width:64px;height:64px;border-radius:8px;border:1px solid var(--border);background:var(--card2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted2)}
.bolo-title{font-size:15px;font-weight:700;margin-bottom:4px}
.bolo-roblox{font-size:11px;color:var(--muted);margin-bottom:4px}
.bolo-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.bolo-meta{font-size:10px;color:var(--muted2)}
.bolo-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
.bolo-badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.detail-row{font-size:11px;margin-bottom:4px}
.detail-row strong{color:var(--text)}
.detail-row span{color:var(--muted)}

/* RECORDS TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);font-weight:700}
td{padding:11px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--card2)}

/* ROBLOX */
.roblox-result{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:20px;display:flex;gap:16px;max-width:520px}
.roblox-avatar{width:96px;height:96px;border-radius:8px;border:1px solid var(--border);object-fit:cover;flex-shrink:0;background:var(--card)}
.roblox-username{font-size:16px;font-weight:700;margin-bottom:8px}
.roblox-detail{font-size:11px;color:var(--muted);margin-top:4px}
.roblox-detail em{color:var(--text);font-style:normal}

/* RADIO */
.radio-wrap{display:flex;gap:16px;height:calc(100vh - 196px)}
.radio-roster{width:180px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.radio-roster-header{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.roster-card{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.roster-card.me{border-color:var(--primary-25);background:var(--primary-10)}
.roster-name{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.roster-badge{font-size:10px;color:var(--muted);padding-left:13px;margin-top:2px}
.radio-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.radio-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--border)}
.chat-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-right:4px}
.chat-bubble{max-width:72%;border-radius:8px;padding:9px 13px;border:1px solid;font-size:12px}
.chat-bubble.self{align-self:flex-end;background:var(--primary-10);border-color:var(--primary-25)}
.chat-bubble.other{align-self:flex-start;background:var(--card2);border-color:var(--border)}
.chat-bubble.system{align-self:center;font-size:10px;color:var(--muted);background:transparent;border:none;padding:3px 0}
.chat-sender{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.chat-ts{font-size:9px;color:var(--muted);text-align:right;margin-top:4px}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1}

/* MISC */
.flex{display:flex;align-items:center}
.flex-col{display:flex;flex-direction:column}
.between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:14px}.mt-4{margin-top:20px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:14px}
.text-muted{color:var(--muted)}.text-primary{color:var(--primary)}.text-red{color:var(--red)}.text-green{color:var(--green)}.text-amber{color:var(--amber)}
.font-bold{font-weight:700}.upper{text-transform:uppercase}.tracking{letter-spacing:.1em}
.text-xs{font-size:11px}.text-2xs{font-size:10px}.text-3xs{font-size:9px}
.w-full{width:100%}.shrink-0{flex-shrink:0}
.empty-state{text-align:center;padding:48px 0;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.trooper-banner{background:var(--primary-10);border:1px solid var(--primary-25);border-radius:6px;padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--primary);margin-bottom:14px}
</style>

<style>
/* ===== MOBILE RESPONSIVE FIX ===== */

  }

}
</style>

<body>
<div id="root"></div>

<script>
// ===================== STATE =====================
const S = {
  trooper: null,
  page: 'dashboard',
  calls: [], bolos: [], records: [], radio: [],
  modal: null,
  units: [],
  unitStatuses: ['10-8 Available','Enroute','On Scene','Busy','10-7 Out of Service'],
  roblox: null, robloxLoading: false, robloxError: null, _rq: '',
};
const KEY = { session:'fhp_trooper', calls:'fhp_calls', bolos:'fhp_bolos', records:'fhp_records', radio:'fhp_radio' };

const ADMIN_PASSWORD = 'fhpadmin';

// ===================== STORAGE =====================
function load() {
  try { S.trooper = JSON.parse(localStorage.getItem(KEY.session)); } catch {}
  try { S.calls = JSON.parse(localStorage.getItem(KEY.calls)) || []; } catch {}
  try { S.bolos = JSON.parse(localStorage.getItem(KEY.bolos)) || []; } catch {}
  try { S.records = JSON.parse(localStorage.getItem(KEY.records)) || []; } catch {}
  try { S.radio = JSON.parse(localStorage.getItem(KEY.radio)) || []; } catch {}
}
function persist(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ===================== HELPERS =====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function ts() { return new Date().toISOString(); }
function fmtTime(iso) { try { return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch { return ''; } }
function fmtShortTime(iso) { try { return new Date(iso).toISOString().substring(11,16); } catch { return ''; } }
function fmtDate(iso) { try { return new Date(iso).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}); } catch { return ''; } }
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function trooperLabel() { return S.trooper ? `Trooper ${S.trooper.name} · ${S.trooper.callsign}` : ''; }
function clockStr() { return new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'; }
function nextCallNum() { return (S.calls.length ? Math.max(...S.calls.map(c=>c.num||0)) + 1 : 1001); }
function q(s) { return document.querySelector(s); }
function qa(s) { return Array.from(document.querySelectorAll(s)); }

// ===================== BROADCAST RADIO =====================
let bc;
try { bc = new BroadcastChannel('fhp_radio_v2'); } catch {}
function radioAppend(msg) {
  S.radio.push(msg);
  if (S.radio.length > 300) S.radio = S.radio.slice(-300);
  persist(KEY.radio, S.radio); syncRadio();
}
function radioSend(msg) {
  if (msg.kind !== 'join' && msg.kind !== 'leave') radioAppend(msg);
  if (bc) try { bc.postMessage(msg); } catch {}
}
if (bc) bc.onmessage = e => {
  const m = e.data;
  if (m.kind !== 'join' && m.kind !== 'leave') radioAppend(m);
  if (S.page === 'radio') refreshPage();
};
setInterval(() => {
  S.radio = [];
  persist(KEY.radio, []);
  const m = { id: uid(), kind: 'system', content: '— Channel history cleared automatically —', ts: ts() };
  S.radio.push(m);
  persist(KEY.radio, S.radio); syncRadio();
  if (bc) try { bc.postMessage(m); } catch {}
  if (S.page === 'radio') refreshPage();
}, 45 * 60 * 1000);


const HISTORY_EXPIRE_MS = 60 * 60 * 1000;

function cleanupExpiredData(){
  const now = Date.now();

  S.bolos = S.bolos.filter(b => {
    if(!b.ts) return true;
    return (now - new Date(b.ts).getTime()) < HISTORY_EXPIRE_MS;
  });

  S.calls = S.calls.filter(c => {
    if(!c.ts) return true;
    return (now - new Date(c.ts).getTime()) < HISTORY_EXPIRE_MS;
  });

  S.radio = S.radio.filter(r => {
    if(!r.ts) return true;
    return (now - new Date(r.ts).getTime()) < HISTORY_EXPIRE_MS;
  });

  persist(KEY.bolos, S.bolos);
  persist(KEY.calls, S.calls);
  persist(KEY.radio, S.radio); syncRadio();
}

function render() {
  q('#root').innerHTML = S.trooper ? appHtml() : loginHtml();

function refreshPage() {
  const pg = q('#page');

  bindPage();
  if (S.page === 'radio') setTimeout(() => { const l = q('#chat-log'); if (l) l.scrollTop = l.scrollHeight; }, 10);

function afterRender() {
  bindAll();
  if (S.modal) showModal();
  if (S.page === 'radio') setTimeout(() => { const l = q('#chat-log'); if (l) l.scrollTop = l.scrollHeight; }, 10);

}

  }));
  qa('[data-resolve]').forEach(el => el.addEventListener('click', () => {
    const c = S.calls.find(x=>x.id===el.dataset.resolve); if(c) c.status='resolved';
    persist(KEY.calls, S.calls); refreshPage();
  }));
  
  qa('[data-join]').forEach(el => el.addEventListener('click', () => {
    const c = S.calls.find(x => x.id === el.dataset.join);

      r => r !== S.trooper.callsign
    );

      id:uid(),
      kind:'system',

        id:uid(),
        kind:'message',
        name:S.trooper.name,
        callsign:S.trooper.callsign,

function dispatchVoice(text){

  if(!('speechSynthesis' in window)) return;

  const speech = new SpeechSynthesisUtterance(text);

  speech.rate = 1;
  speech.pitch = 1;
  speech.volume = 1;
  speech.lang = 'en-US';

  const voices = window.speechSynthesis.getVoices();

  const preferred = voices.find(
    v => v.name.includes('Google') || v.name.includes('Microsoft')
  );

  if(preferred){
    speech.voice = preferred;
  }

  window.speechSynthesis.speak(speech);
}


function updateTrooperStatus(newStatus){
  if(!S.trooper) return;

  S.trooper.status = newStatus;
  persist(KEY.session, S.trooper); syncUnits();

  const unit = S.units.find(
    u => u.callsign === S.trooper.callsign
  );

  if(unit){
    unit.status = newStatus;
    unit.lastStatusUpdate = ts();
  }

  refreshPage();
  render();
}


function playSound(id){
  const s = document.getElementById(id);
  if(!s) return;
  try{
    s.currentTime = 0;
    s.play();
  }catch(e){}
}

function doSignOn() {
  const n = q('#ln')?.value.trim(); const cs = q('#lcs')?.value.trim();
  if(!n||!cs) return;
  const isAdmin = q('#admin-pass')?.value === ADMIN_PASSWORD;

  S.trooper = {
    name:n,
    callsign:cs,
    admin:isAdmin,
    status:'10-8 Available'
  };

  S.units.push({
    name:n,
    callsign:cs,
    status:'10-8 Available',
    online:true,
    ts:ts()
  });
  persist(KEY.session, S.trooper); syncUnits();
  S.page = 'dashboard';
  radioSend({id:uid(),kind:'join',name:n,callsign:cs,ts:ts()});
  render();
}
function doSignOff() {
  if(S.trooper) radioSend({id:uid(),kind:'leave',name:S.trooper.name,callsign:S.trooper.callsign,ts:ts()});
  S.trooper = null;
  localStorage.removeItem(KEY.session);
  render();
}
function doRadioSend() {
  const inp = q('#radio-in'); const c = inp?.value.trim();
  if(!c) return;
  const m = {id:uid(),kind:'message',name:S.trooper.name,callsign:S.trooper.callsign,content:c,ts:ts()};
  radioSend(m);
  inp.value = '';
  refreshPage();
}
async function doRoblox() {
  const u = q('#rq')?.value.trim();
  if(!u) return;

  S._rq = u;
  S.robloxLoading = true;
  S.roblox = null;
  S.robloxError = null;
  refreshPage();

  try {
    const r1 = await fetch(
      'https://users.roblox.com/v1/usernames/users',
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          usernames:[u],
          excludeBannedUsers:false
        })
      }
    );

    const d1 = await r1.json();
    const user = d1.data?.[0];

    if(!user){
      S.robloxError = `User "${u}" not found on Roblox.`;
      S.robloxLoading = false;
      refreshPage();
      return;
    }

    const r2 = await fetch(`https://users.roblox.com/v1/users/${user.id}`);
    const profile = await r2.json();

    let avatarUrl = null;

    try{
      const r3 = await fetch(
        `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${user.id}&size=420x420&format=Png&isCircular=false`
      );

      const d3 = await r3.json();
      avatarUrl = d3.data?.[0]?.imageUrl || null;
    }catch{}

    let presence = null;

    try{
      const pr = await fetch(
        'https://presence.roblox.com/v1/presence/users',
        {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            userIds:[user.id]
          })
        }
      );

      const pd = await pr.json();
      presence = pd.userPresences?.[0] || null;
    }catch{}

    S.roblox = {
      ...profile,
      avatarUrl,
      online: presence?.userPresenceType > 0,
      lastLocation: presence?.lastLocation || 'Offline'
    };

    S.robloxLoading = false;
    refreshPage();

  } catch(e) {
    S.robloxError = 'Failed to reach Roblox.';
    S.robloxLoading = false;
    refreshPage();
  }
}
